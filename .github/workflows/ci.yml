name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
          cache: true

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test (unit, with race detector)
        run: go test -race -count=1 ./...

      - name: smoke (integration suite)
        run: go test -tags smoke -count=1 ./tests/smoke/...

  docker-build:
    name: docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: build image (no push)
        uses: docker/build-push-action@84ad562665bb303b549fec655d1b64f9945f3f91 # v6.15.0
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: crate-html:ci

      - name: smoke the image (cratesplainer reachable)
        run: |
          docker run -d --name crated -p 7777:7777 crate-html:ci
          for i in $(seq 1 20); do
            if curl -sSf -o /dev/null http://localhost:7777/api/status; then
              echo "daemon up"
              break
            fi
            sleep 0.5
          done
          curl -sSf -o /dev/null http://localhost:7777/cratesplainer/
          docker logs crated | head -10
          docker rm -f crated

  hadolint:
    name: hadolint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: Dockerfile
