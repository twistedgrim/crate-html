version: "3"

vars:
  BIN_DIR: "{{.ROOT_DIR}}/bin"

tasks:
  default:
    cmds:
      - task: build

  tidy:
    desc: Resolve and tidy module dependencies
    cmds:
      - go mod tidy

  build:
    desc: Build crate and crated into ./bin
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - go build -o {{.BIN_DIR}}/crate ./cmd/crate
      - go build -o {{.BIN_DIR}}/crated ./cmd/crated

  test:
    desc: Run all tests
    cmds:
      - go test ./...

  vet:
    desc: go vet
    cmds:
      - go vet ./...

  lint:
    desc: Static analysis (vet for now; golangci-lint to be added)
    cmds:
      - task: vet

  run:
    desc: Build and run crated in the foreground
    cmds:
      - task: build
      - "{{.BIN_DIR}}/crated"

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf {{.BIN_DIR}}
