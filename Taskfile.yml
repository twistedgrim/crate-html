version: "3"

vars:
  BIN_DIR: "{{.ROOT_DIR}}/bin"

tasks:
  default:
    desc: List available tasks
    silent: true
    cmds:
      - task --list

  tidy:
    desc: Resolve and tidy module dependencies
    cmds:
      - go mod tidy

  build:
    desc: Build crate and crated into ./bin
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - go build -o {{.BIN_DIR}}/crate ./cmd/crate
      - go build -o {{.BIN_DIR}}/crated ./cmd/crated

  hooks:install:
    desc: Install local Lefthook safeguards (format, lint, Conventional Commits)
    cmds:
      - lefthook install

  hooks:run:
    desc: Run all configured local Lefthook checks
    cmds:
      - lefthook run pre-commit

  test:
    desc: Run all tests
    cmds:
      - go test ./...

  vet:
    desc: go vet
    cmds:
      - go vet ./...

  lint:
    desc: Static analysis (vet for now; golangci-lint to be added)
    cmds:
      - task: vet

  run:
    desc: Build and run crated in the foreground
    cmds:
      - task: build
      - "{{.BIN_DIR}}/crated"

  smoke:
    desc: End-to-end integration tests (builds binaries, starts an isolated crated on :17777, runs Go test suite under build tag `smoke`)
    cmds:
      - go test -tags smoke -count=1 ./tests/smoke/...

  docker:build:
    desc: Build the crate-html Docker image
    cmds:
      - docker compose build

  docker:up:
    desc: Start crated in Docker (port 7777, persistent volumes)
    cmds:
      - docker compose up -d
      - sleep 1
      - docker compose ps

  docker:down:
    desc: Stop the crated container (volumes preserved)
    cmds:
      - docker compose down

  docker:nuke:
    desc: Stop the container and DELETE the config + data volumes
    cmds:
      - docker compose down -v

  docker:logs:
    desc: Tail the crated container logs
    cmds:
      - docker compose logs -f crated

  docker:token:
    desc: Print just the bearer token from the dockerized daemon (via `crate token` inside the container)
    cmds:
      - docker compose exec -T crated crate token

  docker:env:
    desc: Print env-var exports to point the host CLI at the dockerized daemon. Use `eval $(task docker:env)`.
    silent: true
    cmds:
      - |
        TOKEN=$(docker compose exec -T crated crate token | tr -d '[:space:]')
        echo "export CRATE_TOKEN=$TOKEN"
        echo "export CRATE_BASE_URL=http://localhost:7777"

  docker:shell:
    desc: Exec a shell into the running crated container
    cmds:
      - docker compose exec crated sh

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf {{.BIN_DIR}}
