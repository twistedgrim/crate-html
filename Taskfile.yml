version: "3"

vars:
  BIN_DIR: "{{.ROOT_DIR}}/bin"

tasks:
  default:
    desc: List available tasks
    silent: true
    cmds:
      - task --list

  tidy:
    desc: Resolve and tidy module dependencies
    cmds:
      - go mod tidy

  build:
    desc: Build crate and crated into ./bin
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - go build -o {{.BIN_DIR}}/crate ./cmd/crate
      - go build -o {{.BIN_DIR}}/crated ./cmd/crated

  test:
    desc: Run all tests
    cmds:
      - go test ./...

  vet:
    desc: go vet
    cmds:
      - go vet ./...

  lint:
    desc: Static analysis (vet for now; golangci-lint to be added)
    cmds:
      - task: vet

  run:
    desc: Build and run crated in the foreground
    cmds:
      - task: build
      - "{{.BIN_DIR}}/crated"

  smoke:
    desc: End-to-end smoke test against an isolated crated on port 17777
    cmds:
      - ./scripts/smoke.sh

  docker:build:
    desc: Build the crate-html Docker image
    cmds:
      - docker compose build

  docker:up:
    desc: Start crated in Docker (port 7777, persistent volumes)
    cmds:
      - docker compose up -d
      - sleep 1
      - docker compose ps

  docker:down:
    desc: Stop the crated container (volumes preserved)
    cmds:
      - docker compose down

  docker:nuke:
    desc: Stop the container and DELETE the config + data volumes
    cmds:
      - docker compose down -v

  docker:logs:
    desc: Tail the crated container logs
    cmds:
      - docker compose logs -f crated

  docker:token:
    desc: Print the bearer token from the dockerized daemon's config volume
    cmds:
      - docker compose exec crated cat /config/crate/config.yaml

  docker:env:
    desc: Print env-var exports to point the host CLI at the dockerized daemon. Use `eval $(task docker:env)`.
    silent: true
    cmds:
      - |
        TOKEN=$(docker compose exec -T crated cat /config/crate/config.yaml | awk '/^token:/{print $2}')
        echo "export CRATE_TOKEN=$TOKEN"
        echo "export CRATE_BASE_URL=http://localhost:7777"

  docker:shell:
    desc: Exec a shell into the running crated container
    cmds:
      - docker compose exec crated sh

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf {{.BIN_DIR}}
